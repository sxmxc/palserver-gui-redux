name: release

# Pushing a v* tag builds portable executables on Windows, Linux, and macOS,
# packages them, and publishes a GitHub Release. Platform-specific runners are
# required because each executable must be built on its target operating system.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: ubuntu-latest
            artifact: linux
          - os: macos-latest
            artifact: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build the portable distribution: esbuild bundle → Node SEA → release/.
      - run: pnpm release:exe

      # Include LICENSE.md in every distribution as required by the PolyForm
      # Noncommercial notices; build-sea.mjs copies it into release/.
      - name: Package portable ZIP (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cd release && zip -r ../palserver-agent-${{ matrix.artifact }}.zip palserver-agent web LICENSE.md

      - name: Package portable ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path release/palserver-agent.exe, release/web, release/LICENSE.md -DestinationPath palserver-agent-${{ matrix.artifact }}.zip

      # ZIP files are for manual downloads. The in-app updater uses the tar.gz
      # archives because they preserve executable permissions and macOS ad-hoc signatures.
      - name: Package updater archive (tar.gz)
        shell: bash
        run: tar -czf palserver-agent-${{ matrix.artifact }}.tar.gz -C release .

      - uses: actions/upload-artifact@v5
        with:
          name: palserver-agent-${{ matrix.artifact }}
          path: |
            palserver-agent-${{ matrix.artifact }}.zip
            palserver-agent-${{ matrix.artifact }}.tar.gz

      # The standalone web build can be deployed separately and only needs one build.
      - name: Package standalone web build
        if: matrix.artifact == 'linux'
        shell: bash
        run: cp LICENSE.md packages/web/dist/ && cd packages/web/dist && zip -r ../../../palserver-web.zip .

      - uses: actions/upload-artifact@v5
        if: matrix.artifact == 'linux'
        with:
          name: palserver-web
          path: palserver-web.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      # Check out the exact tagged revision so the release body matches the build.
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Verify release notes
        run: test -s RELEASE_NOTES.md
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      # Flatten build artifacts and generate checksums. The in-app updater refuses
      # releases without SHA256SUMS.txt (see packages/agent/src/self-update.ts).
      - name: Collect artifacts and generate SHA256SUMS.txt
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec mv {} dist/ \;
          cd dist && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          # Publish the release notes committed with this tag; do not generate a
          # separate commit list.
          body_path: ${{ github.workspace }}/RELEASE_NOTES.md
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: false
          fail_on_unmatched_files: true
