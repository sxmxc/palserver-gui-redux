# palserver-gui agent (management UI backend and frontend)
# Runs in the Kubernetes cluster and uses its service account to access the game-server StatefulSet.
---
apiVersion: v1
kind: Namespace
metadata:
  name: palserver
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: palserver-agent-sa
  namespace: palserver
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: palserver-agent-data
  namespace: palserver
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: palserver-agent-role
  namespace: palserver
rules:
  # Read StatefulSets and patch their scale.
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # StatefulSet scale subresource.
  - apiGroups: ["apps"]
    resources: ["statefulsets/scale"]
    verbs: ["get", "patch", "update"]
  # List and delete Pods (for restarts), and read logs.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Execute commands in Pods (save files, engine tuning, and other file operations; k3s requires create and get).
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: palserver-agent-rb
  namespace: palserver
subjects:
  - kind: ServiceAccount
    name: palserver-agent-sa
    namespace: palserver
roleRef:
  kind: Role
  name: palserver-agent-role
  apiGroup: rbac.authorization.k8s.io
# Before applying this bundle, create the referenced Secret out-of-band:
# kubectl -n palserver create secret generic palworld-secrets
#   --from-literal=server-password='...' --from-literal=admin-password='...'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: palserver-agent
  namespace: palserver
  labels:
    app: palserver-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: palserver-agent
  template:
    metadata:
      labels:
        app: palserver-agent
    spec:
      serviceAccountName: palserver-agent-sa
      volumes:
        - name: agent-data
          persistentVolumeClaim:
            claimName: palserver-agent-data
      containers:
        - name: agent
          image: palserver-agent:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8250
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PALSERVER_AGENT_HOST
              value: "0.0.0.0"
            - name: PALSERVER_AGENT_PORT
              value: "8250"
            - name: PALSERVER_NO_OPEN
              value: "1"
            - name: PALSERVER_REQUIRE_TOKEN
              value: "0"
            - name: PALSERVER_TELEMETRY
              value: "0"
            - name: PALSERVER_AUTO_UPDATE
              value: "0"
            # Persist the store (instances.json, tokens, reports, and so on) on a separate PVC.
            # This survives Pod restarts and avoids coupling its lifecycle to the game PVC.
            - name: PALSERVER_DATA_DIR
              value: /agent-data
          volumeMounts:
            - name: agent-data
              mountPath: /agent-data
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "4Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: palserver-agent
  namespace: palserver
spec:
  type: NodePort
  selector:
    app: palserver-agent
  ports:
    - port: 8250
      targetPort: 8250
      nodePort: 30000
      protocol: TCP
      name: http
